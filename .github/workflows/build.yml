name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-mod:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: Cache Gradle deps
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-iceymod-${{ hashFiles('mod/build.gradle', 'mod/gradle.properties', 'mod/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-iceymod-
      - name: Build iceymod jar
        run: cd mod && chmod +x gradlew && ./gradlew build --no-daemon
      - uses: actions/upload-artifact@v4
        with:
          name: mod-jar
          path: mod/build/libs/iceymod-*.jar

  build-windows:
    needs: [build-mod, build-smp]
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Download freshly-built mod jar
        uses: actions/download-artifact@v4
        with:
          name: mod-jar
          path: mod/build/libs
      - name: Download all iceymodplus jars
        uses: actions/download-artifact@v4
        with:
          pattern: smp-jar-mc*
          merge-multiple: true
          path: mod-smp/build/libs
      - name: npm install (with retry)
        shell: pwsh
        run: |
          for ($i = 1; $i -le 4; $i++) {
            Write-Host ("npm install attempt {0}" -f $i)
            npm install
            if ($LASTEXITCODE -eq 0) { break }
            Write-Host ("Attempt {0} failed, retrying in 20s..." -f $i)
            Start-Sleep -Seconds 20
          }
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
      - name: Pre-download NSIS resources (mitigates GitHub CDN 504s)
        shell: pwsh
        run: |
          $cacheDir = "$env:LOCALAPPDATA\electron-builder\Cache\nsis"
          New-Item -ItemType Directory -Force -Path $cacheDir | Out-Null
          $urls = @(
            @{ Name = "nsis-3.0.4.1"; Url = "https://github.com/electron-userland/electron-builder-binaries/releases/download/nsis-3.0.4.1/nsis-3.0.4.1.7z" },
            @{ Name = "nsis-resources-3.4.1"; Url = "https://github.com/electron-userland/electron-builder-binaries/releases/download/nsis-resources-3.4.1/nsis-resources-3.4.1.7z" }
          )
          foreach ($r in $urls) {
            $dst = "$cacheDir\$($r.Name).7z"
            for ($i = 1; $i -le 5; $i++) {
              Write-Host ("Attempt {0}: {1}" -f $i, $r.Name)
              try {
                Invoke-WebRequest -Uri $r.Url -OutFile $dst -UseBasicParsing -TimeoutSec 120
                Write-Host ("  OK ({0} bytes)" -f (Get-Item $dst).Length)
                break
              } catch {
                Write-Host ("  Failed: {0}" -f $_.Exception.Message)
                Start-Sleep -Seconds 10
              }
            }
          }
      - name: Build (with retry)
        shell: pwsh
        run: |
          for ($i = 1; $i -le 3; $i++) {
            Write-Host ("electron-builder attempt {0}" -f $i)
            npx electron-builder --win --publish never
            if ($LASTEXITCODE -eq 0) { break }
            Write-Host ("Attempt {0} failed, retrying in 15s..." -f $i)
            Start-Sleep -Seconds 15
          }
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: dist/*.exe

  build-mac:
    needs: [build-mod, build-smp]
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Download freshly-built mod jar
        uses: actions/download-artifact@v4
        with:
          name: mod-jar
          path: mod/build/libs
      - name: Download all iceymodplus jars
        uses: actions/download-artifact@v4
        with:
          pattern: smp-jar-mc*
          merge-multiple: true
          path: mod-smp/build/libs
      - name: npm install (with retry)
        run: |
          for i in 1 2 3 4; do
            echo "npm install attempt $i"
            if npm install; then
              echo "OK"
              exit 0
            fi
            echo "Attempt $i failed, retrying in 20s..."
            sleep 20
          done
          exit 1
      - name: electron-builder (with retry)
        run: |
          for i in 1 2 3; do
            echo "electron-builder attempt $i"
            if npx electron-builder --mac --publish never; then
              exit 0
            fi
            echo "Attempt $i failed, retrying in 15s..."
            sleep 15
          done
          exit 1
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mac-build
          path: dist/*.dmg

  build-linux-arm64:
    needs: [build-mod, build-smp]
    runs-on: ubuntu-latest
    # Bail fast instead of hanging at the default 6-hour timeout. Cold
    # arm64-electron build is ~6 min; 20 minutes is generous.
    timeout-minutes: 20
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Download freshly-built mod jar
        uses: actions/download-artifact@v4
        with:
          name: mod-jar
          path: mod/build/libs
      - name: Download all iceymodplus jars
        uses: actions/download-artifact@v4
        with:
          pattern: smp-jar-mc*
          merge-multiple: true
          path: mod-smp/build/libs
      - name: Cache npm + Electron cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.npm
            ~/.cache/electron
          key: linux-npm-electron-${{ hashFiles('package-lock.json', 'package.json') }}
          restore-keys: linux-npm-electron-
      - name: npm install (with retry)
        run: |
          for i in 1 2 3 4; do
            echo "npm install attempt $i"
            if npm install; then
              exit 0
            fi
            echo "Attempt $i failed, retrying in 20s..."
            sleep 20
          done
          exit 1
      - name: Install fpm dependencies
        run: sudo apt-get update && sudo apt-get install -y libcrypt1 rpm
      - name: Pre-download Electron arm64 with retries
        run: |
          ELECTRON_URL="https://github.com/electron/electron/releases/download/v28.3.3/electron-v28.3.3-linux-arm64.zip"
          CACHE_DIR="${HOME}/.cache/electron"
          mkdir -p "$CACHE_DIR"
          DEST="$CACHE_DIR/electron-v28.3.3-linux-arm64.zip"
          for i in 1 2 3 4 5; do
            echo "Attempt $i: downloading Electron arm64..."
            if curl -L --retry 3 --retry-delay 5 -o "$DEST" "$ELECTRON_URL"; then
              echo "Download succeeded ($(stat --printf='%s' "$DEST") bytes)"
              break
            fi
            echo "Attempt $i failed, retrying in 10s..."
            sleep 10
          done
      - name: electron-builder (with timeout + retry)
        run: |
          # Wrap in `timeout 12m` per attempt — if electron-builder or fpm
          # hangs (most often fpm interacting with system-rpm), kill it
          # and retry on a fresh process. 3 attempts × 12min = 36min cap
          # but the job-level timeout-minutes already bounds the whole job.
          for i in 1 2 3; do
            echo "electron-builder attempt $i"
            if timeout 12m npx electron-builder --linux rpm --arm64 --publish never; then
              echo "OK"
              exit 0
            fi
            echo "Attempt $i timed out or failed; cleaning dist/ and retrying in 15s..."
            rm -rf dist/
            sleep 15
          done
          exit 1
        env:
          ELECTRON_CACHE: ~/.cache/electron
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-arm64-build
          path: dist/*.rpm

  build-smp:
    # Per-version Fabric server mod build. Each matrix entry produces one
    # jar (iceysmp-1.0.0-mc<version>.jar) that the launcher's Settings →
    # Advanced → "Download This Mod" button fetches from the release.
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - mc: "1.21"
            yarn: "1.21+build.9"
            fabric: "0.102.0+1.21"
          - mc: "1.21.5"
            yarn: "1.21.5+build.1"
            fabric: "0.119.5+1.21.5"
          - mc: "1.21.8"
            yarn: "1.21.8+build.1"
            fabric: "0.136.1+1.21.8"
          - mc: "1.21.11"
            yarn: "1.21.11+build.1"
            fabric: "0.139.4+1.21.11"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: Cache Gradle deps (per MC version)
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-iceysmp-${{ matrix.mc }}-${{ hashFiles('mod-smp/build.gradle', 'mod-smp/gradle.properties', 'mod-smp/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-iceysmp-${{ matrix.mc }}-
      - name: Build iceysmp jar (MC ${{ matrix.mc }})
        run: |
          cd mod-smp
          chmod +x gradlew
          ./gradlew build --no-daemon \
            -Pminecraft_version=${{ matrix.mc }} \
            -Pyarn_mappings=${{ matrix.yarn }} \
            -Pfabric_version=${{ matrix.fabric }}
      - uses: actions/upload-artifact@v4
        with:
          name: smp-jar-mc${{ matrix.mc }}
          path: mod-smp/build/libs/iceymodplus-server-mod-mc${{ matrix.mc }}-*.jar

  build-datapack:
    # Zip the mod-smp/datapack tree into iceymodplus-server-pack-1.0.0.zip
    # for vanilla servers that can't run Fabric mods. Single artifact —
    # the datapack is version-agnostic across MC 1.21+ (pack.mcmeta uses
    # supported_formats range).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Zip datapack
        run: |
          cd mod-smp/datapack
          zip -r ../../iceymodplus-server-pack-1.0.0.zip .
      - uses: actions/upload-artifact@v4
        with:
          name: smp-datapack
          path: iceymodplus-server-pack-1.0.0.zip

  release:
    needs: [build-windows, build-mac, build-linux-arm64, build-smp, build-datapack]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: List release files
        run: ls -la dist/
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          draft: false
