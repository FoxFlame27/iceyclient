name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-mod:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.14'
      - name: Build Fabric mod
        working-directory: mod
        run: gradle build --no-daemon
      - name: Upload mod jar
        uses: actions/upload-artifact@v4
        with:
          name: mod-build
          path: mod/build/libs/iceymod-*.jar
          if-no-files-found: warn

  build-windows:
    needs: build-mod
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          # no cache — package-lock.json not in repo
      - name: Download mod jar
        uses: actions/download-artifact@v4
        with:
          name: mod-build
          path: mod/build/libs
        continue-on-error: true
      - run: npm install
      - run: npx electron-builder --win --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: dist/*.exe

  build-mac:
    needs: build-mod
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          # no cache — package-lock.json not in repo
      - name: Download mod jar
        uses: actions/download-artifact@v4
        with:
          name: mod-build
          path: mod/build/libs
        continue-on-error: true
      - run: npm install
      - run: npx electron-builder --mac --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mac-build
          path: dist/*.dmg

  build-linux:
    needs: build-mod
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          # no cache — package-lock.json not in repo
      - name: Download mod jar
        uses: actions/download-artifact@v4
        with:
          name: mod-build
          path: mod/build/libs
        continue-on-error: true
      - run: npm install
      - run: npx electron-builder --linux --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: dist/*.AppImage

  release:
    needs: [build-mod, build-windows, build-mac, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: List release files
        run: ls -la dist/
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          draft: false
